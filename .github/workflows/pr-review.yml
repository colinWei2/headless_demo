# ============================================
# Claude Code 自动 PR 审查工作流
# ============================================
#
# 【功能说明】
# 当有人创建或更新 Pull Request（PR）时，这个工作流会自动：
# 1. 检出代码并分析变更
# 2. 调用 Claude AI 进行代码审查
# 3. 在 PR 中发布审查评论
#
# 【什么是 Headless 模式】
# Headless 是 Claude Code 的命令行模式，无需交互界面。
# 它可以通过脚本或 CI/CD 系统自动运行，非常适合自动化场景。
#
# 【使用前准备】
# 需要在 GitHub 仓库的 Settings > Secrets and variables > Actions 中设置：
#   - ANTHROPIC_API_KEY: 你的 Anthropic API 密钥（从 https://console.anthropic.com 获取）
#
# 【触发时机】
# - opened: PR 被创建时
# - synchronize: PR 有新的提交被推送时
# - reopened: 之前关闭的 PR 被重新打开时
# ============================================

name: Claude PR Review

# --------------------------------------------
# 触发条件（on）
# --------------------------------------------
# 定义什么情况下会启动这个工作流
on:
  pull_request:
    types: [opened, synchronize, reopened]  # PR 创建、更新、重新打开时触发

# --------------------------------------------
# 并发控制（concurrency）
# --------------------------------------------
# 防止同一个 PR 的多个工作流实例同时运行，浪费资源
concurrency:
  # 为同一个 PR 的所有运行创建一个组
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  # 如果有新的运行，取消正在运行的旧实例
  cancel-in-progress: true

# --------------------------------------------
# 任务定义（jobs）
# --------------------------------------------
# 一个工作流可以包含多个任务，这里只有一个名为 "review" 的任务
jobs:
  review:
    # 指定运行环境：最新版本的 Ubuntu Linux
    runs-on: ubuntu-latest

    # ----------------------------------------
    # 权限设置（permissions）
    # ----------------------------------------
    # GitHub Action 默认只有只读权限，这里明确指定需要的权限
    permissions:
      contents: read      # 读取代码内容（用于检出代码）
      pull-requests: write  # 写入 PR（用于发布评论）

    # ----------------------------------------
    # 步骤列表（steps）
    # ----------------------------------------
    # 每个 step 按顺序执行，可以使用前一步的输出
    steps:
      # ======================================
      # 步骤 1: 检出代码
      # ======================================
      # 将仓库代码下载到运行环境中
      - name: Checkout code
        uses: actions/checkout@v4  # 使用 GitHub 官方的 checkout action
        with:
          # fetch-depth: 0 表示获取完整的 git 历史
          # 默认只获取最近一次提交，设置为 0 才能获取 PR 的完整 diff
          fetch-depth: 0

      # ======================================
      # 步骤 2: 设置 Node.js 环境
      # ======================================
      # Claude Code 是用 Node.js 编写的，需要先安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"  # 使用 Node.js 20 版本

      # ======================================
      # 步骤 3: 安装 Claude Code
      # ======================================
      # 通过 npm 全局安装 Claude Code CLI 工具
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # ======================================
      # 步骤 4: 获取变更文件列表
      # ======================================
      # 分析 PR 中改动了哪些文件，并将结果保存到输出变量中
      - name: Get changed files
        id: changed  # 给这个步骤一个 ID，后续步骤可以通过 steps.changed.outputs.xxx 引用其输出
        run: |
          # git diff 命令对比当前分支和目标分支的差异
          # origin/${{ github.base_ref }} 是 PR 的目标分支（如 main）
          # HEAD 是当前 PR 分支的最新提交
          # ... 语法表示比较两个提交之间的差异
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$FILES"

          # 将文件列表转为单行格式（用空格分隔）
          # tr '\n' ' ' 将换行符替换为空格
          FILES_INLINE=$(echo "$FILES" | tr '\n' ' ')

          # 将结果写入 GitHub Actions 的输出变量
          # $GITHUB_OUTPUT 是一个特殊的文件，写入它的内容会被后续步骤引用
          echo "files=$FILES_INLINE" >> $GITHUB_OUTPUT

          # 统计变更文件的数量
          # wc -l 统计行数
          COUNT=$(echo "$FILES" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # ======================================
      # 步骤 5: 运行 Claude 审查（核心步骤）
      # ======================================
      # 这是整个工作流的核心：调用 Claude AI 进行代码审查
      - name: Run Claude Review
        id: review  # 设置 ID，方便后续步骤引用审查结果
        env:
          # 从 GitHub Secrets 中获取 API 密钥，不会在日志中显示
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          # ----------------------------------------
          # 配置 Claude Code（使用智谱 AI 代理）
          # ----------------------------------------
          mkdir -p ~/.claude
          echo '{
            "env": {
              "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic",
              "ANTHROPIC_API_KEY": "'"$ZHIPU_API_KEY"'"
            }
          }' > ~/.claude/settings.json

          # ----------------------------------------
          # 构建发送给 Claude 的提示词（Prompt）
          # ----------------------------------------
          # 这里定义了审查的范围、标准和输出格式
          PROMPT="Review this Pull Request（请使用中文回答）:

          ## 变更文件 (${{ steps.changed.outputs.count }} 个文件)
          ${{ steps.changed.outputs.files }}

          ## 审查指南
          请审查以下方面：
          1. **代码质量**: 代码整洁性、命名规范、DRY 原则
          2. **潜在 Bug**: 边界情况、错误处理
          3. **安全性**: 安全漏洞、输入验证
          4. **性能**: 低效代码、冗余操作
          5. **最佳实践**: 框架约定、设计模式

          ## 输出格式
          请按以下格式提供反馈：

          ### 概要
          [1-2 句话总结]

          ### 发现的问题
          - 🔴 **严重问题**: [描述] (文件:行号)
          - 🟡 **警告**: [描述] (文件:行号)
          - 🔵 **建议**: [描述] (文件:行号)

          ### 改进建议
          [可操作的建议]

          ### 审查结论
          ✅ 批准 / ⚠️ 需要修改 / ❌ 要求修改"

          # ----------------------------------------
          # 调用 Claude Code（Headless 模式）
          # ----------------------------------------
          # claude 命令的参数说明：
          # -p "$PROMPT"        : 传入提示词
          # --output-format json : 输出 JSON 格式，方便程序处理
          # --max-turns 10      : 最多进行 10 轮对话（用于复杂任务）
          # --allowedTools       : 限制 Claude 只能使用这些工具
          #                       Read: 读取文件内容
          #                       Grep: 搜索代码
          #                       Glob: 查找文件
          # > review.json       : 将输出重定向到文件
          claude -p "$PROMPT" \
            --output-format json \
            --max-turns 10 \
            --allowedTools Read,Grep,Glob > review.json

          # ----------------------------------------
          # 提取审查结果
          # ----------------------------------------
          # jq 是一个 JSON 处理工具，从 review.json 中提取 .result 字段
          RESULT=$(jq -r '.result' review.json)

          # 使用 base64 编码结果，避免特殊字符导致 Shell 解析错误
          # 这是最安全的方式，可以传递任意内容（包括代码片段、特殊符号等）
          ENCODED_RESULT=$(echo "$RESULT" | base64 -w 0)

          # 将编码后的结果写入输出变量
          echo "result=$ENCODED_RESULT" >> $GITHUB_OUTPUT

      # ======================================
      # 步骤 6: 发布审查评论到 PR
      # ======================================
      # 使用 GitHub Script Action 在 PR 中创建评论
      - name: Post Review Comment
        uses: actions/github-script@v7  # GitHub 官方提供的运行 JavaScript 的 action
        env:
          # 通过环境变量传递审查结果，避免特殊字符导致的语法错误
          REVIEW_RESULT: ${{ steps.review.outputs.result }}
        with:
          # 这里编写 JavaScript 代码，可以使用 GitHub API
          script: |
            // 从环境变量获取 base64 编码的审查结果并解码
            const encoded = process.env.REVIEW_RESULT || '';
            const review = Buffer.from(encoded, 'base64').toString('utf-8');

            // 添加格式化的头部信息
            const comment = `## 🤖 Claude Code Review

            ${review}

            ---
            *Automated review by Claude Code*`;

            // 调用 GitHub API 创建评论
            // github.rest 是 GitHub REST API 的封装
            await github.rest.issues.createComment({
              issue_number: context.issue.number,  // PR 编号
              owner: context.repo.owner,            // 仓库所有者
              repo: context.repo.repo,              // 仓库名称
              body: comment                         // 评论内容
            });

      # ======================================
      # 步骤 7: 检查关键问题
      # ======================================
      # 根据 Claude 的审查结果，决定工作流是成功还是失败
      - name: Check for critical issues
        run: |
          # 获取 base64 编码的审查结果并解码
          ENCODED="${{ steps.review.outputs.result }}"
          RESULT=$(echo "$ENCODED" | base64 -d)

          # 如果发现关键问题（🔴 Critical），输出警告
          # grep -q 表示静默搜索（不输出匹配内容）
          if echo "$RESULT" | grep -q "🔴 \*\*Critical\*\*"; then
            echo "::warning::Critical issues found in code review"
          fi

          # 如果 Claude 要求修改（❌ Request Changes），则工作流失败
          # exit 1 会让 GitHub Action 标记为失败，PR 会显示红色❌
          if echo "$RESULT" | grep -q "❌ Request Changes"; then
            echo "::error::Code review requests changes"
            exit 1
          fi

# ============================================
# 工作流运行后的结果
# ============================================
# - 成功: PR 中会显示绿色的✅，并且有 Claude 的审查评论
# - 失败: PR 中会显示红色的❌，表示审查发现需要修改的问题
# ============================================
